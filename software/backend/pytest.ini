[pytest]
; `backend` is imported as an absolute package (e.g. `from backend.engine...`)
; throughout main.py, mirroring how uvicorn is launched from the `software/`
; directory. Adding the parent directory to sys.path here means `pytest` can
; be run from anywhere (e.g. `cd software/backend && pytest`) without needing
; PYTHONPATH set manually.
pythonpath = ..
testpaths = tests
python_files = test_*.py
