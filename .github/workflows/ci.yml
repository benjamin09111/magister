name: CI - software/

# Runs the backend test suite and the frontend type-check/build on every
# push and pull request that touches the publishable software artifact
# (software/). This is the automated verification a SoftwareX reviewer
# expects (pytest + build must be green, not just "it worked on my machine").

on:
  push:
    branches: [main]
    paths:
      - 'software/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'software/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: software/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: software/backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -v

  frontend-build:
    name: Frontend type-check + build (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: software
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: software/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint (reports only — pre-existing violations not yet cleaned up, see README)
        run: npm run lint
        continue-on-error: true

      - name: Production build
        run: npm run build
